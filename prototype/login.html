<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOH CMS — 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-primary); }
.auth-card { width: 100%; max-width: 400px; background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-8); box-shadow: var(--shadow-md); }
.auth-logo { font-size: var(--text-xl); font-weight: 700; color: var(--color-interactive-primary); text-align: center; margin-bottom: var(--space-6); letter-spacing: -0.02em; }
.auth-error { padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-status-error-bg); color: var(--color-status-error); font-size: var(--text-sm); margin-bottom: var(--space-4); display: none; }
.auth-link { font-size: var(--text-sm); color: var(--color-interactive-primary); text-align: center; display: block; margin-top: var(--space-4); }
</style>
</head>
<body>

<div class="app">
<a href="#main-content" class="skip-to-content">본문으로 건너뛰기</a>

<div class="auth-page" id="main-content">
  <div class="auth-card">
    <div class="auth-logo">DOOH CMS</div>
    <div class="auth-error" id="login-error">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    <form onsubmit="return handleLogin(event)">
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="email">이메일</label>
        <input type="email" id="email" class="form-control" placeholder="name@company.kr" required autofocus style="width:100%;">
      </div>
      <div class="form-group" style="margin-bottom:var(--space-6);">
        <label class="form-label" for="password">비밀번호</label>
        <input type="password" id="password" class="form-control" placeholder="비밀번호 입력" required style="width:100%;">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:var(--space-3);">로그인</button>
    </form>
    <a href="#" class="auth-link">비밀번호를 잊으셨나요?</a>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('active');setTimeout(function(){t.classList.remove('active');},2500);}

function handleLogin(e) {
  e.preventDefault();
  document.getElementById('login-error').style.display = 'block';
  showToast('데모 모드: 로그인 실패 상태를 표시합니다.');
  return false;
}
</script>
</body>
</html>
