<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 편성 충돌 해소</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        blue: {
          50: '#f0faf3', 100: '#e6f9ed', 200: '#b3eccc', 300: '#66d999',
          400: '#33cc77', 500: '#03C75A', 600: '#02a84c', 700: '#028a3e',
          800: '#016b30', 900: '#014d23',
        },
        gray: {
          50: '#FAF9F7', 100: '#F2F0ED', 200: '#E8E6E3', 300: '#D0CCC7',
          400: '#B0ABA5', 500: '#8A8580', 600: '#6E6A65', 700: '#55514D',
          800: '#3B3835', 900: '#2D2A26',
        },
      },
      borderRadius: {
        'sm': '4px', 'md': '6px', 'lg': '10px', 'xl': '12px',
      },
    },
  },
}
</script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div id="app-header"></div>
  <div style="display:flex;">
    <div id="app-sidebar"></div>
    <main style="flex:1; padding:32px; max-width:900px;">

      <!-- Breadcrumb + Title -->
      <div style="margin-bottom:24px;">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px; font-size:var(--text-xs); color:var(--color-neutral-400);">
          <a href="list.html" style="color:var(--color-neutral-400); text-decoration:none;">편성 관리</a>
          <span>›</span>
          <a href="detail.html" style="color:var(--color-neutral-400); text-decoration:none;" id="breadcrumb-detail">편성표 상세</a>
          <span>›</span>
          <span style="color:var(--color-neutral-700); font-weight:500;">편성 충돌 해소</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <a href="detail.html" style="display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:var(--radius-md); border:1px solid rgba(0,0,0,0.1); background:white; color:var(--color-neutral-600); text-decoration:none; font-size:16px; box-shadow:var(--shadow-sm);">←</a>
          <div>
            <h1 style="font-size:var(--text-xl); font-weight:700; color:var(--color-neutral-900); margin:0;">편성 충돌 해소</h1>
            <p style="font-size:var(--text-xs); color:var(--color-neutral-500); margin:2px 0 0;">두 편성표의 기간이 겹칩니다. 아래 옵션 중 하나를 선택하세요.</p>
          </div>
        </div>
      </div>

      <!-- Conflict summary banner -->
      <div style="display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(232,160,48,0.08); border:1px solid rgba(232,160,48,0.25); border-radius:var(--radius-lg); margin-bottom:20px;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0;">
          <path d="M9 2L16 15H2L9 2Z" stroke="var(--color-warning-600)" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 7V10" stroke="var(--color-warning-600)" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="9" cy="12.5" r="0.8" fill="var(--color-warning-600)"/>
        </svg>
        <div>
          <span style="font-size:var(--text-sm); font-weight:600; color:var(--color-warning-600);">충돌 감지</span>
          <span style="font-size:var(--text-sm); color:var(--color-neutral-700); margin-left:8px;">
            <strong id="banner-current-name"></strong>과(와) <strong id="banner-conflict-name"></strong>이(가) 같은 매체(<span id="banner-media-name"></span>)에서 기간이 겹칩니다.
          </span>
        </div>
      </div>

      <!-- Conflict Timeline Visualization -->
      <div class="card" style="margin-bottom:20px; overflow:hidden;">
        <div style="padding:14px 16px 10px; border-bottom:1px solid rgba(0,0,0,0.06); display:flex; align-items:center; justify-content:space-between;">
          <span style="font-size:var(--text-sm); font-weight:600; color:var(--color-neutral-900);">충돌 타임라인</span>
          <div style="display:flex; gap:14px; align-items:center;">
            <div style="display:flex; align-items:center; gap:5px;">
              <div style="width:16px; height:10px; background:linear-gradient(135deg, var(--color-primary-500), var(--color-primary-600)); border-radius:2px;"></div>
              <span style="font-size:10px; color:var(--color-neutral-500);">현재 편성표</span>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
              <div style="width:16px; height:10px; background:rgba(3,199,90,0.08); border:1.5px solid var(--color-primary-500); border-radius:2px;"></div>
              <span style="font-size:10px; color:var(--color-neutral-500);">충돌 편성표</span>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
              <div style="width:16px; height:10px; background:var(--color-warning-50); border:1.5px dashed var(--color-warning-500); border-radius:2px;"></div>
              <span style="font-size:10px; color:var(--color-neutral-500);">겹침 구간</span>
            </div>
          </div>
        </div>
        <!-- Month ruler -->
        <div style="padding:10px 16px 0; padding-left:calc(16px + 100px + 12px);">
          <div style="display:flex;" id="month-ruler"></div>
        </div>
        <div id="conflict-timeline-container"></div>
        <!-- Date range label -->
        <div style="padding:4px 16px 12px; padding-left:calc(16px + 100px + 12px); display:flex; justify-content:space-between;">
          <span style="font-size:10px; color:var(--color-neutral-400);" id="range-label-start"></span>
          <span style="font-size:10px; color:var(--color-neutral-400);" id="range-label-end"></span>
        </div>
      </div>

      <!-- Resolution Options -->
      <div style="margin-bottom:24px;">
        <div style="font-size:var(--text-sm); font-weight:600; color:var(--color-neutral-900); margin-bottom:12px;">해소 방법 선택</div>

        <!-- Option A -->
        <label class="option-card" id="option-A" style="display:flex; gap:14px; padding:16px; border-radius:var(--radius-lg); border:2px solid rgba(0,0,0,0.08); background:white; margin-bottom:10px; cursor:pointer; transition:all 0.15s;">
          <div style="padding-top:2px;">
            <input type="radio" name="resolution" value="A" style="width:16px; height:16px; accent-color:var(--color-primary-500);" onchange="onOptionChange(this.value)">
          </div>
          <div style="flex:1;">
            <div style="font-size:var(--text-sm); font-weight:600; color:var(--color-neutral-900); margin-bottom:3px;">현재 편성표 우선순위 유지</div>
            <div style="font-size:var(--text-xs); color:var(--color-neutral-500);">두 편성표가 겹쳐 저장됩니다. 겹치는 구간에서는 현재 편성표(<span id="opt-a-name"></span>, P1)가 우선 재생됩니다.</div>
          </div>
          <div style="display:flex; align-items:center;">
            <span class="badge badge-active" style="white-space:nowrap;">P1 우선</span>
          </div>
        </label>

        <!-- Option B -->
        <label class="option-card" id="option-B" style="display:flex; gap:14px; padding:16px; border-radius:var(--radius-lg); border:2px solid rgba(0,0,0,0.08); background:white; margin-bottom:10px; cursor:pointer; transition:all 0.15s;">
          <div style="padding-top:2px;">
            <input type="radio" name="resolution" value="B" style="width:16px; height:16px; accent-color:var(--color-primary-500);" onchange="onOptionChange(this.value)">
          </div>
          <div style="flex:1;">
            <div style="font-size:var(--text-sm); font-weight:600; color:var(--color-neutral-900); margin-bottom:3px;">충돌 편성표 기간 조정</div>
            <div style="font-size:var(--text-xs); color:var(--color-neutral-500); margin-bottom:10px;">충돌 편성표(<span id="opt-b-name"></span>)의 기간을 수정하여 겹침을 없앱니다.</div>
            <div id="option-b-dates" style="display:flex; gap:12px; align-items:center; pointer-events:none; opacity:0.45; transition:opacity 0.15s;">
              <div>
                <div class="form-label">시작일</div>
                <input type="date" id="adjust-start" class="form-input" value="2026-05-01" style="width:160px; font-size:var(--text-xs);" onchange="onDateChange()">
              </div>
              <div style="font-size:var(--text-xs); color:var(--color-neutral-400); padding-top:18px;">~</div>
              <div>
                <div class="form-label">종료일</div>
                <input type="date" id="adjust-end" class="form-input" value="2026-05-31" style="width:160px; font-size:var(--text-xs);" onchange="onDateChange()">
              </div>
            </div>
          </div>
        </label>

        <!-- Option C -->
        <label class="option-card" id="option-C" style="display:flex; gap:14px; padding:16px; border-radius:var(--radius-lg); border:2px solid rgba(0,0,0,0.08); background:white; cursor:pointer; transition:all 0.15s;">
          <div style="padding-top:2px;">
            <input type="radio" name="resolution" value="C" style="width:16px; height:16px; accent-color:var(--color-primary-500);" onchange="onOptionChange(this.value)">
          </div>
          <div style="flex:1;">
            <div style="font-size:var(--text-sm); font-weight:600; color:var(--color-neutral-900); margin-bottom:3px;">현재 편성표 저장 취소</div>
            <div style="font-size:var(--text-xs); color:var(--color-neutral-500);">새로 만든 편성표를 저장하지 않고 되돌립니다. 충돌 편성표(<span id="opt-c-name"></span>)는 유지됩니다.</div>
          </div>
          <div style="display:flex; align-items:center;">
            <span class="badge badge-ended" style="white-space:nowrap;">저장 취소</span>
          </div>
        </label>
      </div>

      <!-- Action Buttons -->
      <div style="display:flex; justify-content:flex-end; gap:10px; padding-top:4px; border-top:1px solid rgba(0,0,0,0.06);">
        <a href="detail.html" class="btn btn-secondary">취소</a>
        <button class="btn btn-primary" onclick="applyResolution()">적용</button>
      </div>

    </main>
  </div>

  <script src="../shared/icons.js"></script>
  <script src="../shared/layout.js"></script>
  <script src="data.js"></script>
  <script src="timeline.js"></script>
  <script>
    const RANGE_START = '2026-03-01';
    const RANGE_END   = '2026-06-30';
    const currentSchedule  = SCHEDULE_LIST[0]; // s1
    const conflictSchedule = SCHEDULE_LIST[2]; // s3

    let selectedOption = 'A';

    // Populate static text
    document.getElementById('banner-current-name').textContent  = currentSchedule.name;
    document.getElementById('banner-conflict-name').textContent = conflictSchedule.name;
    document.getElementById('banner-media-name').textContent    = getMediaById(currentSchedule.mediaId)?.name || '';
    document.getElementById('opt-a-name').textContent = currentSchedule.name;
    document.getElementById('opt-b-name').textContent = conflictSchedule.name;
    document.getElementById('opt-c-name').textContent = conflictSchedule.name;
    document.getElementById('range-label-start').textContent = RANGE_START;
    document.getElementById('range-label-end').textContent   = RANGE_END;

    // Month ruler
    (function buildRuler() {
      const ruler = document.getElementById('month-ruler');
      const total = daysBetween(RANGE_START, RANGE_END);
      const months = [];
      let cursor = new Date(RANGE_START + 'T00:00:00');
      const end   = new Date(RANGE_END   + 'T00:00:00');
      while (cursor < end) {
        const monthStart = new Date(cursor);
        cursor.setMonth(cursor.getMonth() + 1);
        const monthEnd = cursor < end ? new Date(cursor) : new Date(end);
        const startDay = daysBetween(RANGE_START, monthStart.toISOString().split('T')[0]);
        const endDay   = daysBetween(RANGE_START, monthEnd.toISOString().split('T')[0]);
        const widthPct = ((endDay - startDay) / total) * 100;
        months.push({ label: (monthStart.getMonth()+1) + '월', widthPct });
      }
      ruler.innerHTML = months.map(m =>
        `<div style="flex:0 0 ${m.widthPct}%; font-size:9px; color:var(--color-neutral-400); text-align:center;">${m.label}</div>`
      ).join('');
    })();

    function getConflictForOption(option) {
      if (option !== 'B') return conflictSchedule;
      const startVal = document.getElementById('adjust-start').value || conflictSchedule.start;
      const endVal   = document.getElementById('adjust-end').value   || conflictSchedule.end;
      return { ...conflictSchedule, start: startVal, end: endVal };
    }

    function renderTimeline(option) {
      const container = document.getElementById('conflict-timeline-container');
      renderConflictTimeline(container, {
        currentSchedule,
        conflictSchedule: getConflictForOption(option),
        media: MEDIA_LIST,
        rangeStart: RANGE_START,
        rangeEnd:   RANGE_END,
        selectedOption: option,
      });
    }

    function updateOptionStyles(option) {
      ['A', 'B', 'C'].forEach(o => {
        const card = document.getElementById('option-' + o);
        if (o === option) {
          card.style.borderColor = 'var(--color-primary-500)';
          card.style.background  = 'var(--color-primary-50)';
        } else {
          card.style.borderColor = 'rgba(0,0,0,0.08)';
          card.style.background  = 'white';
        }
      });
      // Enable / disable date inputs for option B
      const datePicker = document.getElementById('option-b-dates');
      if (option === 'B') {
        datePicker.style.opacity        = '1';
        datePicker.style.pointerEvents  = 'auto';
      } else {
        datePicker.style.opacity        = '0.45';
        datePicker.style.pointerEvents  = 'none';
      }
    }

    function onOptionChange(value) {
      selectedOption = value;
      updateOptionStyles(value);
      renderTimeline(value);
    }

    function onDateChange() {
      if (selectedOption === 'B') renderTimeline('B');
    }

    function applyResolution() {
      // In prototype: just navigate back
      window.location.href = 'detail.html';
    }

    // Initial render — default option A selected
    document.querySelector('input[value="A"]').checked = true;
    updateOptionStyles('A');
    renderTimeline('A');
  </script>
</body>
</html>
