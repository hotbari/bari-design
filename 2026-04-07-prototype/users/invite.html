<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 사용자 초대</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        blue: {
          50: '#f0faf3', 100: '#e6f9ed', 200: '#b3eccc', 300: '#66d999',
          400: '#33cc77', 500: '#03C75A', 600: '#02a84c', 700: '#028a3e',
          800: '#016b30', 900: '#014d23',
        },
        gray: {
          50: '#FAF9F7', 100: '#F2F0ED', 200: '#E8E6E3', 300: '#D0CCC7',
          400: '#B0ABA5', 500: '#8A8580', 600: '#6E6A65', 700: '#55514D',
          800: '#3B3835', 900: '#2D2A26',
        },
      },
      borderRadius: {
        'sm': '4px', 'md': '6px', 'lg': '10px', 'xl': '12px',
      },
    },
  },
}
</script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="list.html" class="text-sm text-gray-500 hover:text-gray-700">← 사용자 목록</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">사용자 초대</h1>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="list.html">
          <div class="form-group">
            <label class="form-label">이메일 주소 <span class="text-red-500">*</span></label>
            <input type="email" class="form-input" placeholder="user@company.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">역할 <span class="text-red-500">*</span></label>
            <select class="form-input" required id="role-select" onchange="document.getElementById('scope-section').classList.toggle('hidden', this.value==='media')">
              <option value="">역할 선택</option>
              <option value="media" data-roles="admin">매체사</option>
              <option value="ops">운영대행사</option>
              <option value="sales">영업대행사</option>
            </select>
          </div>

          <div class="form-group" data-roles="admin">
            <label class="form-label">소속 매체사 <span class="text-red-500">*</span></label>
            <select class="form-input" required>
              <option value="">매체사 선택</option>
              <option>씨앤에이미디어</option>
              <option>디오에스미디어</option>
              <option>한국옥외광고</option>
            </select>
          </div>

          <!-- 접근 범위 (운영/영업대행사) -->
          <div id="scope-section" class="form-group hidden">
            <label class="form-label">접근 범위</label>
            <div class="border border-gray-200 rounded-lg p-4">
              <p class="text-xs text-gray-500 mb-3">이 사용자가 접근할 수 있는 매체/그룹을 선택하세요</p>
              <div class="space-y-2">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" class="rounded text-blue-600">
                  <span class="text-sm">강남역 1번출구</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" class="rounded text-blue-600">
                  <span class="text-sm">삼성역 B2</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" class="rounded text-blue-600">
                  <span class="text-sm">코엑스 GF 기둥</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" class="rounded text-blue-600">
                  <span class="text-sm">홍대입구역 광장</span>
                </label>
              </div>
            </div>
          </div>

          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mt-4 mb-6">
            <p class="text-sm text-blue-800">초대 이메일이 발송되며, 7일 이내에 가입을 완료해야 합니다.</p>
          </div>

          <div class="flex justify-end gap-2 pt-6 border-t border-gray-200">
            <a href="list.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">초대 발송</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../shared/icons.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
