<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 캠페인 등록 Step 3</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        blue: {
          50: '#f0faf3', 100: '#e6f9ed', 200: '#b3eccc', 300: '#66d999',
          400: '#33cc77', 500: '#03C75A', 600: '#02a84c', 700: '#028a3e',
          800: '#016b30', 900: '#014d23',
        },
        gray: {
          50: '#FAF9F7', 100: '#F2F0ED', 200: '#E8E6E3', 300: '#D0CCC7',
          400: '#B0ABA5', 500: '#8A8580', 600: '#6E6A65', 700: '#55514D',
          800: '#3B3835', 900: '#2D2A26',
        },
      },
      borderRadius: {
        'sm': '4px', 'md': '6px', 'lg': '10px', 'xl': '12px',
      },
    },
  },
}
</script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="new-step2.html" class="text-sm text-gray-500 hover:text-gray-700">← Step 2: 매체 · 기간</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">캠페인 등록</h1>
      </div>

      <!-- 스텝 인디케이터 -->
      <div class="max-w-2xl mb-8">
        <div class="step-indicator">
          <div class="step-dot completed">✓</div>
          <div class="step-line completed"></div>
          <div class="step-dot completed">✓</div>
          <div class="step-line completed"></div>
          <div class="step-dot current">3</div>
        </div>
        <div class="flex justify-between mt-2 text-xs text-gray-500 px-1">
          <span class="text-green-600">기본 정보 ✓</span>
          <span class="text-green-600">매체 · 기간 ✓</span>
          <span class="font-medium text-blue-600">예산 · 확인</span>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="list.html">
          <!-- 과금 설정 -->
          <div class="form-group">
            <label class="form-label">과금 모델 <span class="text-red-500">*</span></label>
            <select class="form-input" required>
              <option value="">과금 모델 선택</option>
              <option selected>고정가</option>
              <option>단가제</option>
              <option>없음</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">금액</label>
            <div class="flex items-center gap-2">
              <input type="number" class="form-input" value="30000000">
              <span class="text-sm text-gray-500">원</span>
            </div>
          </div>

          <!-- 요약 -->
          <div class="mt-8 pt-6 border-t border-gray-200">
            <h3 class="text-sm font-semibold mb-4">캠페인 요약</h3>
            <div class="bg-gray-50 rounded-lg p-6 space-y-3">
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">캠페인명</span>
                <span class="font-medium">여름 신메뉴 광고</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">광고주</span>
                <span class="font-medium">스타벅스코리아</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">유형</span>
                <span class="font-medium">직접 광고</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">대상 매체</span>
                <span class="font-medium">강남역 1번출구 외 1개</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">기간</span>
                <span class="font-medium">2026-05-01 ~ 2026-06-30 (61일)</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">과금</span>
                <span class="font-medium">고정가 30,000,000원</span>
              </div>
            </div>
          </div>

          <!-- 중복 캠페인 경고 -->
          <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mt-4">
            <p class="text-sm text-yellow-800">⚠️ 동일 매체에 기간이 겹치는 캠페인 1건이 있습니다: <strong>갤럭시 S26 런칭 캠페인</strong> (2026-03-15 ~ 2026-04-30)</p>
            <p class="text-xs text-yellow-600 mt-1">이 경고는 참고용이며, 등록에는 영향이 없습니다.</p>
          </div>

          <div class="flex justify-end gap-2 mt-6 pt-6 border-t border-gray-200">
            <a href="new-step2.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">← 이전</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">캠페인 등록</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../shared/icons.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
