<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 매체사 등록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="companies.html" class="text-sm text-gray-500 hover:text-gray-700">← 매체사 목록</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">매체사 등록</h1>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="companies.html">
          <div class="form-group">
            <label class="form-label">사업자등록번호 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="000-00-00000" required>
          </div>
          <div class="form-group">
            <label class="form-label">매체사명 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="매체사명을 입력하세요" required>
          </div>
          <div class="form-group">
            <label class="form-label">대표자명 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="대표자명" required>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">연락 이메일 <span class="text-red-500">*</span></label>
              <input type="email" class="form-input" placeholder="email@company.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">연락 전화번호 <span class="text-red-500">*</span></label>
              <input type="tel" class="form-input" placeholder="02-0000-0000" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">주소</label>
            <input type="text" class="form-input" placeholder="주소 (선택)">
          </div>
          <div class="form-group">
            <label class="form-label">비고</label>
            <textarea class="form-input" rows="3" placeholder="비고 사항 (선택)"></textarea>
          </div>
          <div class="flex justify-end gap-2 mt-6 pt-6 border-t border-gray-200">
            <a href="companies.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">등록</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../shared/layout.js"></script>
</body>
</html>
