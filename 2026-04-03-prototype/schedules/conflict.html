<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 편성 충돌 감지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="detail.html" class="text-sm text-gray-500 hover:text-gray-700">← 편성표 상세</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">편성 충돌 해소</h1>
      </div>

      <div class="max-w-3xl space-y-6">
        <!-- 충돌 요약 -->
        <div class="bg-white rounded-xl border border-yellow-200 p-6">
          <h3 class="text-sm font-semibold mb-4">충돌 정보</h3>
          <div class="grid grid-cols-2 gap-6">
            <div class="border border-blue-200 rounded-lg p-4 bg-blue-50">
              <p class="text-xs text-blue-600 uppercase tracking-wider mb-2">현재 편성표</p>
              <p class="text-sm font-semibold">4월 강남 편성</p>
              <p class="text-xs text-gray-600 mt-1">매체: 강남역 1번출구</p>
              <p class="text-xs text-gray-600">기간: 04-01 ~ 04-30</p>
              <p class="text-xs text-gray-600">우선순위: <strong>1</strong></p>
            </div>
            <div class="border border-yellow-200 rounded-lg p-4 bg-yellow-50">
              <p class="text-xs text-yellow-600 uppercase tracking-wider mb-2">충돌 편성표</p>
              <p class="text-sm font-semibold">5월 프로모션 편성</p>
              <p class="text-xs text-gray-600 mt-1">매체: 강남역 1번출구</p>
              <p class="text-xs text-gray-600">기간: 05-01 ~ 05-31</p>
              <p class="text-xs text-gray-600">우선순위: <strong>2</strong></p>
            </div>
          </div>
          <div class="mt-4 bg-yellow-100 rounded-lg p-3">
            <p class="text-sm text-yellow-800">동일 매체에 기간이 겹치며, 우선순위가 다릅니다. 아래 옵션 중 하나를 선택하여 충돌을 해소하세요.</p>
          </div>
        </div>

        <!-- 해소 옵션 -->
        <div class="bg-white rounded-xl border border-gray-200 p-6">
          <h3 class="text-sm font-semibold mb-4">해소 옵션</h3>
          <div class="space-y-4">
            <label class="flex items-start gap-3 p-4 border border-gray-200 rounded-lg hover:border-blue-300 cursor-pointer">
              <input type="radio" name="resolve" class="mt-1" checked>
              <div>
                <p class="text-sm font-medium">A) 현재 편성표 우선순위 유지</p>
                <p class="text-xs text-gray-500 mt-1">현재 편성(우선순위 1)이 겹치는 기간 동안 우선 적용됩니다. 충돌 편성은 나머지 시간에 재생됩니다.</p>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 border border-gray-200 rounded-lg hover:border-blue-300 cursor-pointer">
              <input type="radio" name="resolve" class="mt-1">
              <div>
                <p class="text-sm font-medium">B) 충돌 편성표 기간 조정</p>
                <p class="text-xs text-gray-500 mt-1">'5월 프로모션 편성'의 시작일을 2026-05-01로 조정하여 겹침을 제거합니다.</p>
                <div class="mt-2 flex gap-2">
                  <input type="date" class="form-input text-sm w-40" value="2026-05-01">
                  <span class="text-sm text-gray-400 self-center">~</span>
                  <input type="date" class="form-input text-sm w-40" value="2026-05-31">
                </div>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 border border-gray-200 rounded-lg hover:border-blue-300 cursor-pointer">
              <input type="radio" name="resolve" class="mt-1">
              <div>
                <p class="text-sm font-medium">C) 현재 편성표 저장 취소</p>
                <p class="text-xs text-gray-500 mt-1">현재 편성표의 변경 사항을 저장하지 않고 돌아갑니다.</p>
              </div>
            </label>
          </div>
        </div>

        <div class="flex justify-end gap-2">
          <a href="detail.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
          <a href="detail.html" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">적용</a>
        </div>
      </div>
    </main>
  </div>
  <script src="../shared/layout.js"></script>
</body>
</html>
