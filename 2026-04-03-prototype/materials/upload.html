<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 소재 업로드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="list.html" class="text-sm text-gray-500 hover:text-gray-700">← 소재 목록</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">소재 업로드</h1>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="list.html">
          <!-- 파일 업로드 영역 -->
          <div class="mb-6">
            <label class="form-label">파일 선택 <span class="text-red-500">*</span></label>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-blue-400 transition-colors cursor-pointer">
              <svg class="w-10 h-10 mx-auto text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
              </svg>
              <p class="text-sm text-gray-600 mb-1">파일을 드래그하거나 클릭하여 선택</p>
              <p class="text-xs text-gray-400">JPG, PNG, MP4, MOV · 최대 500MB</p>
              <input type="file" class="hidden" accept=".jpg,.jpeg,.png,.mp4,.mov">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">소재명 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="소재명을 입력하세요" required>
          </div>
          <div class="form-group">
            <label class="form-label">광고주</label>
            <input type="text" class="form-input" placeholder="광고주명 (선택, 메모용)">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">재생 시간 <span class="text-red-500">*</span></label>
              <div class="flex items-center gap-2">
                <input type="number" class="form-input" placeholder="15" min="1">
                <span class="text-sm text-gray-500">초</span>
              </div>
              <p class="text-xs text-gray-400 mt-1">동영상은 자동 추출됩니다</p>
            </div>
            <div class="form-group">
              <label class="form-label">대상 해상도 <span class="text-red-500">*</span></label>
              <select class="form-input">
                <option>1920 × 1080 (가로)</option>
                <option>1080 × 1920 (세로)</option>
                <option>3840 × 2160 (4K 가로)</option>
                <option>2160 × 3840 (4K 세로)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">비고</label>
            <textarea class="form-input" rows="3" placeholder="추가 메모 (선택)"></textarea>
          </div>

          <div class="flex justify-end gap-2 mt-6 pt-6 border-t border-gray-200">
            <a href="list.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">업로드</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../shared/layout.js"></script>
</body>
</html>
