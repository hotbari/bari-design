<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOH CMS — 매체 그룹 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.group-layout{display:grid;grid-template-columns:300px 1fr;gap:var(--space-4);}
.group-list{background:var(--color-bg-elevated);border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:var(--space-4);}
.group-item{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);cursor:pointer;transition:background var(--transition-fast);display:flex;justify-content:space-between;align-items:center;}
.group-item:hover{background:var(--color-bg-hover);}
.group-item.active{background:var(--color-interactive-muted);color:var(--color-interactive-primary);}
.group-detail{background:var(--color-bg-elevated);border:1px solid var(--color-border-default);border-radius:var(--radius-lg);padding:var(--space-5);}
.media-check{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--color-border-default);font-size:var(--text-sm);}
.media-check:last-child{border-bottom:none;}
.group-count{font-size:var(--text-xs);color:var(--color-text-tertiary);font-weight:400;}
.group-item.active .group-count{color:var(--color-interactive-primary);}
.group-name-input{font-size:var(--text-md);font-weight:700;border:1px solid transparent;border-radius:var(--radius-md);padding:var(--space-1) var(--space-2);transition:border-color var(--transition-fast);width:100%;}
.group-name-input:focus{border-color:var(--color-focus-ring);outline:none;}
.section-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.03em;margin:var(--space-4) 0 var(--space-2);}
@media (max-width:768px){.group-layout{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="app">
<a href="#main-content" class="skip-to-content">본문으로 건너뛰기</a>
  <header class="gnb">
    <div class="gnb-brand">DOOH CMS <span>|</span> <span style="font-weight:500;color:var(--color-text-secondary);font-size:var(--text-sm);">시티미디어</span></div>
    <div class="gnb-actions">
      <button class="gnb-icon" title="알림" aria-label="알림"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
      <div class="gnb-avatar">최</div>
    </div>
  </header>

  <div class="layout-body">
    <nav class="sidebar">
      <button class="sidebar-item" aria-label="대시보드"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span class="sidebar-tooltip">대시보드</span></button>
      <button class="sidebar-item" aria-label="소재 관리"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m22 8-6 4 6 4V8Z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span class="sidebar-tooltip">소재 관리</span></button>
      <button class="sidebar-item" aria-label="편성 관리"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="sidebar-tooltip">편성 관리</span></button>
      <button class="sidebar-item active" aria-label="매체 관리" aria-current="page"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span class="sidebar-tooltip">매체 관리</span></button>
      <button class="sidebar-item" aria-label="캠페인"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="sidebar-tooltip">캠페인</span></button>
      <button class="sidebar-item" aria-label="리포트"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="sidebar-tooltip">리포트</span></button>
    </nav>

    <main class="main" id="main-content">

      <div class="page-header">
        <h1 class="page-title">매체 그룹 관리</h1>
        <button class="btn-primary" onclick="addGroup()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          그룹 추가
        </button>
      </div>

      <div class="group-layout">
        <!-- Left: Group List -->
        <div class="group-list" role="listbox" aria-label="매체 그룹 목록">
          <div class="group-item active" role="option" aria-selected="true" tabindex="0" onclick="selectGroup(0)">
            <span>서울 강남</span>
            <span class="group-count">3개 매체</span>
          </div>
          <div class="group-item" role="option" aria-selected="false" tabindex="0" onclick="selectGroup(1)">
            <span>서울 마포/서대문</span>
            <span class="group-count">2개 매체</span>
          </div>
          <div class="group-item" role="option" aria-selected="false" tabindex="0" onclick="selectGroup(2)">
            <span>종로/영등포</span>
            <span class="group-count">1개 매체</span>
          </div>
        </div>

        <!-- Right: Group Detail -->
        <div class="group-detail" id="groupDetail">
          <input type="text" class="group-name-input" id="groupName" value="서울 강남" aria-label="그룹 이름">

          <div class="section-label">소속 매체</div>
          <div id="assignedMedia">
            <label class="media-check"><input type="checkbox" checked onchange="toggleMedia(this)"> 강남역 1번출구</label>
            <label class="media-check"><input type="checkbox" checked onchange="toggleMedia(this)"> 삼성동 코엑스</label>
            <label class="media-check"><input type="checkbox" checked onchange="toggleMedia(this)"> 서초 교대역</label>
          </div>

          <div class="section-label">미배정 매체</div>
          <div id="unassignedMedia">
            <label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> 홍대입구 메인</label>
            <label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> 종로3가 센트럴</label>
            <label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> 여의도 IFC</label>
            <label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> 마포 상암DMC</label>
            <label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> 영등포 타임스퀘어</label>
          </div>

          <div style="margin-top:var(--space-5);display:flex;justify-content:flex-end;gap:var(--space-3);">
            <button class="btn-secondary">취소</button>
            <button class="btn-primary" onclick="saveGroup()">저장</button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const groups = [
  { name: '서울 강남', assigned: ['강남역 1번출구','삼성동 코엑스','서초 교대역'], unassigned: ['홍대입구 메인','종로3가 센트럴','여의도 IFC','마포 상암DMC','영등포 타임스퀘어'] },
  { name: '서울 마포/서대문', assigned: ['홍대입구 메인','마포 상암DMC'], unassigned: ['강남역 1번출구','삼성동 코엑스','서초 교대역','종로3가 센트럴','여의도 IFC','영등포 타임스퀘어'] },
  { name: '종로/영등포', assigned: ['종로3가 센트럴'], unassigned: ['강남역 1번출구','삼성동 코엑스','서초 교대역','홍대입구 메인','여의도 IFC','마포 상암DMC','영등포 타임스퀘어'] }
];

function selectGroup(idx) {
  document.querySelectorAll('.group-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.setAttribute('aria-selected', i === idx);
  });
  const g = groups[idx];
  document.getElementById('groupName').value = g.name;
  document.getElementById('assignedMedia').innerHTML = g.assigned.map(m =>
    `<label class="media-check"><input type="checkbox" checked onchange="toggleMedia(this)"> ${m}</label>`
  ).join('');
  document.getElementById('unassignedMedia').innerHTML = g.unassigned.map(m =>
    `<label class="media-check"><input type="checkbox" onchange="toggleMedia(this)"> ${m}</label>`
  ).join('');
}

function toggleMedia(cb) {
  const label = cb.parentElement;
  const name = label.textContent.trim();
  if (cb.checked) {
    document.getElementById('assignedMedia').appendChild(label);
  } else {
    document.getElementById('unassignedMedia').appendChild(label);
  }
}

function addGroup() {
  showToast('새 그룹이 추가되었습니다.');
}

function saveGroup() {
  showToast('그룹이 저장되었습니다.');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('active');
  setTimeout(() => t.classList.remove('active'), 2500);
}
</script>
</body>
</html>
