<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOH CMS — 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-primary); }
.auth-card { width: 100%; max-width: 400px; background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-8); box-shadow: var(--shadow-md); }
.auth-logo { font-size: var(--text-xl); font-weight: 700; color: var(--color-interactive-primary); text-align: center; margin-bottom: var(--space-6); letter-spacing: -0.02em; }
.auth-error { padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-status-error-bg); color: var(--color-status-error); font-size: var(--text-sm); margin-bottom: var(--space-4); display: none; }
.auth-link { font-size: var(--text-sm); color: var(--color-interactive-primary); text-align: center; display: block; margin-top: var(--space-4); }
</style>
</head>
<body>

<div class="app">
<a href="#main-content" class="skip-to-content">본문으로 건너뛰기</a>

<div class="auth-page" id="main-content">
  <div class="auth-card">
    <div class="auth-logo">DOOH CMS</div>
    <div class="auth-error" id="login-error" role="alert">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    <form onsubmit="return handleLogin(event)">
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="email">이메일</label>
        <input type="email" id="email" class="form-control" placeholder="name@company.kr" required autofocus style="width:100%;">
      </div>
      <div class="form-group" style="margin-bottom:var(--space-6);">
        <label class="form-label" for="password">비밀번호</label>
        <div style="position:relative;"><input type="password" id="password" class="form-control" placeholder="비밀번호 입력" required style="width:100%;padding-right:var(--space-8);"><button type="button" onclick="togglePw()" aria-label="비밀번호 표시" style="position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);padding:var(--space-1);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:var(--space-3);">로그인</button>
    </form>
    <a href="#" class="auth-link">비밀번호를 잊으셨나요?</a>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('active');setTimeout(function(){t.classList.remove('active');},2500);}
function togglePw(){var p=document.getElementById('password');var isText=p.type==='text';p.type=isText?'password':'text';p.nextElementSibling.setAttribute('aria-label',isText?'비밀번호 표시':'비밀번호 숨기기');}

function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var pw = document.getElementById('password').value;
  if (email && pw) {
    document.getElementById('login-error').style.display = 'none';
    var btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = '로그인 중...';
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 800);
    return false;
  }
  var err = document.getElementById('login-error');
  err.style.display = 'block';
  err.focus();
  return false;
}
</script>
</body>
</html>
