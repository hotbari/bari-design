<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOH CMS — 가입 완료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-primary); }
.auth-card { width: 100%; max-width: 400px; background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-8); box-shadow: var(--shadow-md); }
.auth-logo { font-size: var(--text-xl); font-weight: 700; color: var(--color-interactive-primary); text-align: center; margin-bottom: var(--space-6); letter-spacing: -0.02em; }
.auth-error { padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-status-error-bg); color: var(--color-status-error); font-size: var(--text-sm); margin-bottom: var(--space-4); display: none; }
.auth-link { font-size: var(--text-sm); color: var(--color-interactive-primary); text-align: center; display: block; margin-top: var(--space-4); }
.invite-info { padding: var(--space-4); border-radius: var(--radius-md); background: var(--color-bg-surface); margin-bottom: var(--space-5); font-size: var(--text-sm); }
.invite-info dt { color: var(--color-text-secondary); font-size: var(--text-xs); margin-bottom: 2px; }
.invite-info dd { font-weight: 600; margin-bottom: var(--space-2); }
.invite-info dd:last-child { margin-bottom: 0; }
.strength-bar { height: 4px; background: var(--color-neutral-200); border-radius: 2px; margin-top: var(--space-1); overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width var(--transition-normal), background var(--transition-normal); }
.strength-fill.weak { width: 33%; background: var(--color-status-error); }
.strength-fill.medium { width: 66%; background: var(--color-status-warning); }
.strength-fill.strong { width: 100%; background: var(--color-status-success); }
.match-hint { font-size: var(--text-xs); margin-top: var(--space-1); }
.match-hint.error { color: var(--color-status-error); }
.match-hint.success { color: var(--color-status-success); }
</style>
</head>
<body>

<div class="app">
<a href="#main-content" class="skip-to-content">본문으로 건너뛰기</a>

<div class="auth-page" id="main-content">
  <div class="auth-card">
    <div class="auth-logo">DOOH CMS</div>

    <dl class="invite-info">
      <dt>초대한 사람</dt>
      <dd>최영수 (관리자)</dd>
      <dt>부여된 역할</dt>
      <dd>운영자</dd>
    </dl>

    <form onsubmit="return handleSignup(event)">
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="name">이름 <span class="required">*</span></label>
        <input type="text" id="name" class="form-control" placeholder="이름 입력" required autofocus style="width:100%;">
      </div>
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="password">비밀번호 <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="8자 이상, 영문+숫자+특수문자" required style="width:100%;" oninput="checkStrength()">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="form-hint" id="strength-text"></div>
      </div>
      <div class="form-group" style="margin-bottom:var(--space-6);">
        <label class="form-label" for="password-confirm">비밀번호 확인 <span class="required">*</span></label>
        <input type="password" id="password-confirm" class="form-control" placeholder="비밀번호 재입력" required style="width:100%;" oninput="checkMatch()">
        <div class="match-hint" id="match-hint"></div>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn" style="width:100%;justify-content:center;padding:var(--space-3);">가입 완료</button>
    </form>
    <a href="login.html" class="auth-link">이미 계정이 있으신가요?</a>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('active');setTimeout(function(){t.classList.remove('active');},2500);}

function checkStrength() {
  var pw = document.getElementById('password').value;
  var fill = document.getElementById('strength-fill');
  var text = document.getElementById('strength-text');
  fill.className = 'strength-fill';
  if (pw.length === 0) { text.textContent = ''; return; }
  var score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Za-z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  if (score <= 1) { fill.classList.add('weak'); text.textContent = '약함'; }
  else if (score === 2) { fill.classList.add('medium'); text.textContent = '보통'; }
  else { fill.classList.add('strong'); text.textContent = '강함'; }
  checkMatch();
}

function checkMatch() {
  var pw = document.getElementById('password').value;
  var confirm = document.getElementById('password-confirm').value;
  var hint = document.getElementById('match-hint');
  if (confirm.length === 0) { hint.textContent = ''; hint.className = 'match-hint'; return; }
  if (pw === confirm) { hint.textContent = '비밀번호가 일치합니다.'; hint.className = 'match-hint success'; }
  else { hint.textContent = '비밀번호가 일치하지 않습니다.'; hint.className = 'match-hint error'; }
}

function handleSignup(e) {
  e.preventDefault();
  var pw = document.getElementById('password').value;
  var confirm = document.getElementById('password-confirm').value;
  if (pw !== confirm) { showToast('비밀번호가 일치하지 않습니다.'); return false; }
  if (pw.length < 8) { showToast('비밀번호는 8자 이상이어야 합니다.'); return false; }
  showToast('가입이 완료되었습니다. 로그인 페이지로 이동합니다.');
  return false;
}
</script>
</body>
</html>
