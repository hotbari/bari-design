<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOH CMS — Slack 연동 설정</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<style>
/* Badge variants */
.badge-admin-only { background: var(--color-primary-100); color: var(--color-primary-700); }
.badge-connected { background: var(--color-status-success-bg); color: var(--color-status-success); }
.badge-healthy { background: var(--color-status-success-bg); color: var(--color-status-success); }

/* Toggle */
.toggle { position: relative; width: 44px; height: 24px; border-radius: 12px; background: var(--color-neutral-300); cursor: pointer; transition: background var(--transition-fast); flex-shrink: 0; }
.toggle.active { background: var(--color-interactive-primary); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: transform var(--transition-fast); box-shadow: var(--shadow-sm); }
.toggle.active::after { transform: translateX(20px); }

/* Webhook status row */
.webhook-status { display: flex; align-items: center; gap: var(--space-4); margin-top: var(--space-4); font-size: var(--text-sm); }
.webhook-status-item { display: flex; align-items: center; gap: var(--space-2); }
.webhook-status-label { color: var(--color-text-secondary); }

/* Health check grid */
.health-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); margin-bottom: var(--space-5); }
.health-item-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: 2px; }
.health-item-value { font-size: var(--text-sm); font-weight: 500; }

/* Page title with badge */
.page-title-group { display: flex; align-items: center; gap: var(--space-3); }
</style>
</head>
<body>
<div class="app">
<a href="#main-content" class="skip-to-content">본문으로 건너뛰기</a>
  <header class="gnb"><div class="gnb-brand">DOOH CMS <span>|</span> <span style="font-weight:500;color:var(--color-text-secondary);font-size:var(--text-sm);">시티미디어</span></div><div class="gnb-actions"><button class="gnb-icon" aria-label="알림"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button><div class="gnb-avatar">최</div></div></header>
  <div class="layout-body">
    <nav class="sidebar">
      <button class="sidebar-item" aria-label="대시보드"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span class="sidebar-tooltip">대시보드</span></button>
      <button class="sidebar-item" aria-label="소재 관리"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m22 8-6 4 6 4V8Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><span class="sidebar-tooltip">소재 관리</span></button>
      <button class="sidebar-item" aria-label="편성 관리"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="sidebar-tooltip">편성 관리</span></button>
      <button class="sidebar-item" aria-label="매체 관리"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span class="sidebar-tooltip">매체 관리</span></button>
      <button class="sidebar-item" aria-label="캠페인"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="sidebar-tooltip">캠페인</span></button>
      <button class="sidebar-item active" aria-label="설정" aria-current="page"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="sidebar-tooltip">설정</span></button>
    </nav>
    <main class="main" id="main-content">
      <div class="page-header">
        <div class="page-title-group"><h1 class="page-title">Slack 연동 설정</h1><span class="badge badge-admin-only">관리자 전용</span></div>
      </div>

      <!-- Webhook 설정 -->
      <div class="form-card">
        <div class="form-card-title">Webhook 설정</div>
        <div class="form-group" style="margin-bottom:var(--space-4);">
          <label class="form-label" for="webhook-url">Webhook URL</label>
          <input type="url" id="webhook-url" class="form-control" value="https://hooks.slack.com/services/T00.../B00.../xxx">
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <button class="btn-secondary" onclick="showToast('테스트 메시지를 발송했습니다.')">테스트 발송</button>
        </div>
        <div class="webhook-status">
          <div class="webhook-status-item"><span class="webhook-status-label">연동 상태</span><span class="badge badge-connected">연동됨</span></div>
          <div class="webhook-status-item"><span class="webhook-status-label">마지막 발송</span><span style="font-size:var(--text-sm);">2026.04.05 14:30</span></div>
        </div>
      </div>

      <!-- 카테고리-채널 매핑 -->
      <div class="form-card">
        <div class="form-card-title">카테고리-채널 매핑</div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>알림 카테고리</th><th>Slack 채널</th><th>활성</th></tr></thead>
            <tbody>
              <tr tabindex="0">
                <td class="cell-name">매체 오프라인</td>
                <td class="cell-meta" style="font-family:var(--font-mono);">#alert-media</td>
                <td><div class="toggle active" role="switch" aria-checked="true" aria-label="매체 오프라인 알림 활성" tabindex="0" onclick="toggleSetting(this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSetting(this);}"></div></td>
              </tr>
              <tr tabindex="0">
                <td class="cell-name">소재 검수 실패</td>
                <td class="cell-meta" style="font-family:var(--font-mono);">#alert-material</td>
                <td><div class="toggle active" role="switch" aria-checked="true" aria-label="소재 검수 실패 알림 활성" tabindex="0" onclick="toggleSetting(this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSetting(this);}"></div></td>
              </tr>
              <tr tabindex="0">
                <td class="cell-name">편성 동기화 실패</td>
                <td class="cell-meta" style="font-family:var(--font-mono);">#alert-scheduling</td>
                <td><div class="toggle active" role="switch" aria-checked="true" aria-label="편성 동기화 실패 알림 활성" tabindex="0" onclick="toggleSetting(this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSetting(this);}"></div></td>
              </tr>
              <tr tabindex="0">
                <td class="cell-name">캠페인 상태 변경</td>
                <td class="cell-meta" style="font-family:var(--font-mono);">#ops-campaign</td>
                <td><div class="toggle" role="switch" aria-checked="false" aria-label="캠페인 상태 변경 알림 활성" tabindex="0" onclick="toggleSetting(this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSetting(this);}"></div></td>
              </tr>
              <tr tabindex="0">
                <td class="cell-name">사용자 활동</td>
                <td class="cell-meta" style="font-family:var(--font-mono);">#ops-user</td>
                <td><div class="toggle" role="switch" aria-checked="false" aria-label="사용자 활동 알림 활성" tabindex="0" onclick="toggleSetting(this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSetting(this);}"></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 헬스체크 -->
      <div class="form-card">
        <div class="form-card-title">헬스체크</div>
        <div class="health-grid">
          <div>
            <div class="health-item-label">마지막 확인</div>
            <div class="health-item-value">2026.04.05 14:00</div>
          </div>
          <div>
            <div class="health-item-label">상태</div>
            <div class="health-item-value"><span class="badge badge-healthy">정상</span></div>
          </div>
          <div>
            <div class="health-item-label">응답 시간</div>
            <div class="health-item-value">120ms</div>
          </div>
        </div>
        <button class="btn-secondary" onclick="showToast('헬스체크를 수행 중입니다...')">지금 확인</button>
      </div>
    </main>
  </div>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
function toggleSetting(el){
  el.classList.toggle('active');
  var on=el.classList.contains('active');
  el.setAttribute('aria-checked',on);
  showToast(on?'채널 알림이 활성화되었습니다.':'채널 알림이 비활성화되었습니다.');
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('active');setTimeout(function(){t.classList.remove('active');},2500);}
</script>
</body>
</html>
