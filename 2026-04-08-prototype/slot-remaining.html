<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔여 구좌 조회 — Bari CMS</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="shared/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :focus-visible { outline: 2px solid var(--color-primary-500); outline-offset: 2px; }
    .app-shell { display: flex; height: 100vh; overflow: hidden; background: var(--color-neutral-100); }
    .sidebar { width: 200px; flex-shrink: 0; background: oklch(0.16 0.02 155); display: flex; flex-direction: column; border-right: 1px solid oklch(0.12 0.02 155); }
    .sidebar-logo { display: flex; align-items: center; gap: 8px; padding: 16px; border-bottom: 1px solid oklch(1 0 0 / 0.08); margin-bottom: 6px; }
    .sidebar-logo-mark { width: 28px; height: 28px; background: var(--color-primary-500); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-logo-mark svg { width: 16px; height: 16px; }
    .sidebar-logo-name { font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .sidebar-nav { flex: 1; padding: 4px 8px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
    .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; font-size: var(--text-sm); color: oklch(1 0 0 / 0.55); text-decoration: none; cursor: pointer; transition: background 0.12s, color 0.12s; position: relative; }
    .sidebar-item:hover { background: oklch(1 0 0 / 0.06); color: oklch(1 0 0 / 0.8); }
    .sidebar-item.active { background: oklch(1 0 0 / 0.1); color: white; font-weight: 600; }
    .sidebar-item.active::after { content: ''; position: absolute; right: 0; top: 4px; bottom: 4px; width: 2px; background: var(--color-primary-400); border-radius: 2px; }
    .sidebar-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-subnav { padding: 0 8px 4px 28px; display: flex; flex-direction: column; gap: 1px; }
    .sidebar-subitem { display: block; padding: 5px 10px; border-radius: 5px; font-size: var(--text-xs); color: oklch(1 0 0 / 0.45); text-decoration: none; transition: background 0.1s, color 0.1s; }
    .sidebar-subitem:hover { background: oklch(1 0 0 / 0.05); color: oklch(1 0 0 / 0.75); }
    .sidebar-subitem.active { color: var(--color-primary-300); font-weight: 600; }
    .sidebar-footer { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-top: 1px solid oklch(1 0 0 / 0.08); }
    .sidebar-footer-avatar { width: 28px; height: 28px; background: oklch(0.35 0.12 155); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 700; color: white; flex-shrink: 0; }
    .sidebar-footer-info { flex: 1; min-width: 0; }
    .sidebar-footer-role { font-size: 10px; color: oklch(1 0 0 / 0.35); font-weight: 500; }
    .sidebar-footer-name { font-size: var(--text-xs); color: oklch(1 0 0 / 0.75); font-weight: 600; }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .gnb { height: 52px; flex-shrink: 0; background: white; border-bottom: 1px solid var(--color-border-default); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
    .gnb-breadcrumb { display: flex; align-items: center; gap: 6px; flex: 1; }
    .gnb-breadcrumb-item { font-size: var(--text-sm); color: var(--color-neutral-500); }
    .gnb-breadcrumb-sep { font-size: var(--text-sm); color: var(--color-neutral-300); }
    .gnb-breadcrumb-item.current { color: var(--color-neutral-900); font-weight: 600; }
    .gnb-icon-btn { width: 34px; height: 34px; border: none; background: none; cursor: pointer; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--color-neutral-500); transition: background 0.12s; }
    .gnb-icon-btn:hover { background: var(--color-neutral-100); }
    .gnb-icon-btn svg { width: 16px; height: 16px; }

    .page-content { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: var(--text-xl); font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.4px; }

    /* Summary stat cards */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card { background: white; border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: 16px; }
    .stat-card-label { font-size: var(--text-xs); color: var(--color-neutral-500); font-weight: 500; margin-bottom: 8px; }
    .stat-card-value { font-size: 24px; font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.5px; }
    .stat-card-sub { font-size: var(--text-xs); color: var(--color-neutral-400); margin-top: 4px; }
    .stat-accent { color: var(--color-primary-600); }
    .stat-warn { color: oklch(0.52 0.14 55); }
    .stat-pub { color: oklch(0.42 0.12 280); }

    /* Filter bar */
    .filter-bar { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: 12px 16px; flex-wrap: wrap; }
    .filter-select { height: 32px; padding: 0 10px; border: 1px solid var(--color-border-default); border-radius: var(--radius-md); font-size: var(--text-sm); background: white; cursor: pointer; }
    .filter-select:focus { border-color: var(--color-primary-400); outline: none; }
    .search-wrap { flex: 1; min-width: 160px; position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--color-neutral-400); }
    .search-input { width: 100%; height: 32px; padding: 0 10px 0 32px; border: 1px solid var(--color-border-default); border-radius: var(--radius-md); font-size: var(--text-sm); }
    .search-input:focus { border-color: var(--color-primary-400); outline: none; }
    .filter-reset { height: 32px; padding: 0 12px; font-size: var(--text-sm); color: var(--color-neutral-500); background: none; border: none; cursor: pointer; border-radius: var(--radius-md); }
    .filter-reset:hover { background: var(--color-neutral-100); }

    /* Table with slot bars */
    .table-wrap { background: white; border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); overflow: hidden; }
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--color-border-default); }
    .table-count { font-size: var(--text-sm); color: var(--color-neutral-500); }
    .table-count strong { color: var(--color-neutral-900); font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 14px; text-align: left; font-size: var(--text-xs); font-weight: 600; color: var(--color-neutral-500); background: var(--color-neutral-50); border-bottom: 1px solid var(--color-border-default); text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap; }
    thead th.right { text-align: right; }
    tbody tr:hover { background: var(--color-neutral-50); }
    tbody tr + tr td { border-top: 1px solid var(--color-border-default); }
    tbody td { padding: 12px 14px; font-size: var(--text-sm); color: var(--color-neutral-800); vertical-align: middle; }
    tbody td.right { text-align: right; }
    .media-name { font-weight: 600; color: var(--color-neutral-900); }
    .media-sub  { font-size: var(--text-xs); color: var(--color-neutral-500); margin-top: 2px; }

    /* Slot bar visualization */
    .slot-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
    .slot-bar { height: 12px; border-radius: 3px; overflow: hidden; display: flex; background: var(--color-neutral-100); }
    .slot-seg { height: 100%; transition: width 0.3s; }
    .seg-used { background: var(--color-primary-500); }
    .seg-public { background: oklch(0.62 0.12 280); }
    .seg-free { background: var(--color-neutral-200); }
    .slot-bar-labels { display: flex; gap: 10px; }
    .slot-bar-label { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--color-neutral-500); }
    .slot-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-used   { background: var(--color-primary-500); }
    .dot-public { background: oklch(0.62 0.12 280); }
    .dot-free   { background: var(--color-neutral-300); }

    /* Status badge */
    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: var(--text-xs); font-weight: 600; }
    .status-full    { background: oklch(0.95 0.04 25); color: oklch(0.38 0.14 25); }
    .status-limited { background: oklch(0.94 0.03 55); color: oklch(0.38 0.10 55); }
    .status-ok      { background: var(--color-primary-50); color: var(--color-primary-700); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; }
    .status-full .status-dot    { background: oklch(0.55 0.16 25); }
    .status-limited .status-dot { background: oklch(0.65 0.14 55); }
    .status-ok .status-dot      { background: var(--color-primary-500); }

    .pct-value { font-size: var(--text-sm); font-weight: 600; }
    .pct-used    { color: var(--color-primary-700); }
    .pct-warn    { color: oklch(0.42 0.12 55); }
    .pct-danger  { color: oklch(0.42 0.14 25); }

    /* Legend */
    .legend { display: flex; align-items: center; gap: 14px; font-size: var(--text-xs); color: var(--color-neutral-500); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
    .sw-used { background: var(--color-primary-500); }
    .sw-public { background: oklch(0.62 0.12 280); }
    .sw-free { background: var(--color-neutral-200); border: 1px solid var(--color-neutral-300); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" aria-label="주 내비게이션">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      </div>
      <span class="sidebar-logo-name">Bari CMS</span>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard-admin.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>대시보드
      </a>
      <a class="sidebar-item" href="media-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M5 13v2M11 13v2M3 15h10"/></svg>매체 관리
      </a>
      <a class="sidebar-item" href="material-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="1" width="14" height="14" rx="1.5"/><circle cx="6" cy="6" r="2"/><path d="M1 11l4-3 3 2 3-4 4 5"/></svg>소재 관리
      </a>
      <a class="sidebar-item" href="campaign-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="7"/><polygon points="6,5 12,8 6,11" fill="currentColor" stroke="none"/></svg>캠페인 관리
      </a>
      <a class="sidebar-item active" href="schedule-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="3" width="14" height="12" rx="1.5"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>편성 관리
      </a>
      <div class="sidebar-subnav">
        <a class="sidebar-subitem" href="playlist-list.html">재생목록</a>
        <a class="sidebar-subitem" href="schedule-list.html">편성표</a>
        <a class="sidebar-subitem active" href="slot-remaining.html">잔여 구좌</a>
      </div>
      <a class="sidebar-item" href="user-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>사용자 관리
      </a>
      <a class="sidebar-item" href="report-list.html">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="1" width="14" height="14" rx="1.5"/><path d="M4 11V8M7 11V6M10 11V9M13 11V5"/></svg>리포트
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-avatar">김</div>
      <div class="sidebar-footer-info">
        <div class="sidebar-footer-role">어드민</div>
        <div class="sidebar-footer-name">김관리</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="gnb">
      <nav class="gnb-breadcrumb">
        <span class="gnb-breadcrumb-item">편성 관리</span>
        <span class="gnb-breadcrumb-sep">›</span>
        <span class="gnb-breadcrumb-item current">잔여 구좌</span>
      </nav>
      <button class="gnb-icon-btn" aria-label="알림">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 1a5 5 0 0 1 5 5v3l1.5 2H1.5L3 9V6a5 5 0 0 1 5-5z"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/></svg>
      </button>
    </header>

    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title">잔여 구좌</h1>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:var(--text-xs);color:var(--color-neutral-400)">기준: 2025-05-01 ~ 2025-05-31</div>
          <button class="btn btn-ghost" style="height:32px;font-size:var(--text-xs);padding:0 12px">기간 변경</button>
        </div>
      </div>

      <!-- Summary stats -->
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-card-label">전체 구좌</div>
          <div class="stat-card-value">1,240</div>
          <div class="stat-card-sub">5개 매체 합산</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">사용 중</div>
          <div class="stat-card-value stat-accent">892</div>
          <div class="stat-card-sub">71.9% 점유율</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">잔여 (판매 가능)</div>
          <div class="stat-card-value">212</div>
          <div class="stat-card-sub">전체의 17.1%</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">공익광고 의무 비율</div>
          <div class="stat-card-value stat-pub">136</div>
          <div class="stat-card-sub">전체의 11.0% (기준: ≥10%)</div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <select class="filter-select" id="f-status" onchange="applyFilter()">
          <option value="">전체 상태</option>
          <option value="ok">여유</option>
          <option value="limited">부족</option>
          <option value="full">매진</option>
        </select>
        <select class="filter-select" id="f-pci" onchange="applyFilter()">
          <option value="">공익광고 기준</option>
          <option value="pass">기준 충족</option>
          <option value="fail">기준 미충족</option>
        </select>
        <div class="search-wrap">

          <input type="search" class="search-input" id="f-search" placeholder="매체명 검색" oninput="applyFilter()">
        </div>
        <button class="filter-reset" onclick="resetFilter()">초기화</button>
        <div class="legend">
          <div class="legend-item"><div class="legend-swatch sw-used"></div>사용 중</div>
          <div class="legend-item"><div class="legend-swatch sw-public"></div>공익광고</div>

        </div>

      <!-- Table -->
      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="table-count">매체 <strong id="visible-count">5</strong>개</div>
          <button class="btn btn-ghost" style="height:30px;font-size:var(--text-xs);padding:0 10px">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 8h10M8 3v10"/></svg>
            CSV 내보내기

        </div>
        <table>
          <thead>
            <tr>
              <th>매체</th>
              <th>구좌 현황</th>
              <th class="right">전체</th>
              <th class="right">사용</th>
              <th class="right">공익</th>
              <th class="right">잔여</th>
              <th>점유율</th>
              <th>공익 비율</th>
              <th>상태</th>

          </thead>
          <tbody id="slot-tbody">
            <!-- JS rendered -->
          </tbody>
        </table>
      </div>
    </main>

<script>
const SLOTS = [
  { id:'m-001', name:'강남대로 전광판',   loc:'서울 강남구 강남대로', total:300, used:240, pub:36, status:'ok' },
  { id:'m-002', name:'홍대입구 사이니지', loc:'서울 마포구 홍대입구역', total:240, used:220, pub:18, status:'limited' },
  { id:'m-003', name:'신촌역 디스플레이', loc:'서울 서대문구 신촌역', total:200, used:200, pub:0,  status:'full' },
  { id:'m-004', name:'여의도 IFC 전광판', loc:'서울 영등포구 IFC',     total:360, used:198, pub:54, status:'ok' },
  { id:'m-005', name:'이태원 사이니지',   loc:'서울 용산구 이태원',    total:140, used:34,  pub:28, status:'ok' },
];

function render(data) {
  const tbody = document.getElementById('slot-tbody');
  tbody.innerHTML = data.map(d => {
    const free = d.total - d.used - d.pub;
    const usedPct  = (d.used / d.total * 100).toFixed(1);
    const pubPct   = (d.pub  / d.total * 100).toFixed(1);
    const freePct  = (free   / d.total * 100).toFixed(1);
    const occupancy = ((d.used + d.pub) / d.total * 100).toFixed(1);
    const pciPass = d.pub / d.total >= 0.10;
    const pciPct = (d.pub / d.total * 100).toFixed(1);
    const statusMap = { ok:'ok', limited:'limited', full:'full' };
    const statusLabelMap = { ok:'여유', limited:'부족', full:'매진' };
    const pctClass = occupancy >= 95 ? 'pct-danger' : occupancy >= 80 ? 'pct-warn' : 'pct-used';
    return `
      <tr data-status="${d.status}" data-pci="${pciPass?'pass':'fail'}" data-name="${d.name}">
        <td>
          <div class="media-name">${d.name}</div>
          <div class="media-sub">${d.loc}</div>
        </td>
        <td style="min-width:160px">
          <div class="slot-bar-wrap">
            <div class="slot-bar">
              <div class="slot-seg seg-used" style="width:${usedPct}%"></div>
              <div class="slot-seg seg-public" style="width:${pubPct}%"></div>
              <div class="slot-seg seg-free" style="width:${freePct}%"></div>
            </div>
            <div class="slot-bar-labels">
              <div class="slot-bar-label"><div class="slot-dot dot-used"></div>${usedPct}% 사용</div>
              <div class="slot-bar-label"><div class="slot-dot dot-public"></div>${pubPct}% 공익</div>
              <div class="slot-bar-label"><div class="slot-dot dot-free"></div>${freePct}% 잔여</div>
            </div>
          </div>
        </td>
        <td class="right" style="font-weight:600">${d.total}</td>
        <td class="right">${d.used}</td>
        <td class="right" style="color:oklch(0.42 0.12 280)">${d.pub}</td>
        <td class="right" style="font-weight:600;color:var(--color-primary-700)">${free}</td>
        <td><span class="pct-value ${pctClass}">${occupancy}%</span></td>
        <td>
          <span style="font-size:var(--text-xs);font-weight:600;color:${pciPass?'oklch(0.42 0.12 280)':'oklch(0.42 0.14 25)'}">
            ${pciPct}% ${pciPass?'✓':'✗'}
          </span>
        </td>
        <td>
          <span class="status-badge status-${statusMap[d.status]}">
            <span class="status-dot"></span>${statusLabelMap[d.status]}
          </span>
        </td>
      </tr>
    `;
  }).join('');
  document.getElementById('visible-count').textContent = data.length;
}

function applyFilter() {
  const status = document.getElementById('f-status').value;
  const pci    = document.getElementById('f-pci').value;
  const q      = document.getElementById('f-search').value.toLowerCase();
  const filtered = SLOTS.filter(d => {
    const pciPass = d.pub / d.total >= 0.10;
    if (status && d.status !== status) return false;
    if (pci === 'pass' && !pciPass) return false;
    if (pci === 'fail' && pciPass) return false;
    if (q && !d.name.toLowerCase().includes(q)) return false;
    return true;
  });
  render(filtered);
}

function resetFilter() {
  document.getElementById('f-status').value = '';
  document.getElementById('f-pci').value = '';
  document.getElementById('f-search').value = '';
  render(SLOTS);
}

// Init
render(SLOTS);
</script>
</body>
</html>
