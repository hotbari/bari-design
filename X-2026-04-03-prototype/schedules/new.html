<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 편성표 생성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="list.html" class="text-sm text-gray-500 hover:text-gray-700">← 편성 목록</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">편성표 생성</h1>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="list.html">
          <div class="form-group">
            <label class="form-label">편성표명 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="편성표명을 입력하세요" required>
          </div>

          <div class="form-group">
            <label class="form-label">재생목록 선택 <span class="text-red-500">*</span></label>
            <select class="form-input" required>
              <option value="">재생목록을 선택하세요</option>
              <option>갤럭시 S26 재생목록 (구좌 4개)</option>
              <option>봄 세일 재생목록 (구좌 3개)</option>
              <option>하우스 광고 목록 (구좌 2개)</option>
              <option>CU 프로모션 목록 (구좌 5개)</option>
            </select>
            <p class="text-xs text-gray-400 mt-1">검수완료된 소재로 구성된 재생목록만 선택 가능</p>
          </div>

          <div class="form-group">
            <label class="form-label">대상 매체 선택 <span class="text-red-500">*</span></label>
            <p class="text-xs text-gray-400 mb-2">최소 1개 이상 선택</p>
            <div class="border border-gray-200 rounded-lg max-h-48 overflow-y-auto">
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 border-b border-gray-100 cursor-pointer">
                <input type="checkbox" class="rounded text-blue-600">
                <span class="text-sm">강남역 1번출구</span>
                <span class="badge badge-green ml-auto">활성</span>
              </label>
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 border-b border-gray-100 cursor-pointer">
                <input type="checkbox" class="rounded text-blue-600">
                <span class="text-sm">삼성역 B2</span>
                <span class="badge badge-green ml-auto">활성</span>
              </label>
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 border-b border-gray-100 cursor-pointer">
                <input type="checkbox" class="rounded text-blue-600">
                <span class="text-sm">코엑스 GF 기둥</span>
                <span class="badge badge-green ml-auto">활성</span>
              </label>
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 border-b border-gray-100 cursor-pointer">
                <input type="checkbox" class="rounded text-blue-600" disabled>
                <span class="text-sm text-gray-400">홍대입구역 광장</span>
                <span class="badge badge-gray ml-auto">미연동</span>
              </label>
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" class="rounded text-blue-600" disabled>
                <span class="text-sm text-gray-400">여의도 IFC몰</span>
                <span class="badge badge-yellow ml-auto">비활성</span>
              </label>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">시작일 <span class="text-red-500">*</span></label>
              <input type="date" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">종료일 <span class="text-red-500">*</span></label>
              <input type="date" class="form-input" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">우선순위</label>
            <select class="form-input">
              <option>1 (최우선)</option>
              <option selected>2</option>
              <option>3</option>
              <option>4</option>
              <option>5 (최하위)</option>
            </select>
            <p class="text-xs text-gray-400 mt-1">같은 매체에 복수 편성 시, 높은 우선순위가 우선 적용됩니다</p>
          </div>

          <div class="flex justify-end gap-2 mt-6 pt-6 border-t border-gray-200">
            <a href="list.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">생성</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../shared/layout.js"></script>
</body>
</html>
