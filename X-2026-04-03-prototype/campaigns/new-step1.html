<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOH CMS - 캠페인 등록 Step 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="bg-gray-50">
  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-8">
      <div class="mb-6">
        <a href="list.html" class="text-sm text-gray-500 hover:text-gray-700">← 캠페인 목록</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">캠페인 등록</h1>
      </div>

      <!-- 스텝 인디케이터 -->
      <div class="max-w-2xl mb-8">
        <div class="step-indicator">
          <div class="step-dot current">1</div>
          <div class="step-line"></div>
          <div class="step-dot upcoming">2</div>
          <div class="step-line"></div>
          <div class="step-dot upcoming">3</div>
        </div>
        <div class="flex justify-between mt-2 text-xs text-gray-500 px-1">
          <span class="font-medium text-blue-600">기본 정보</span>
          <span>매체 · 기간</span>
          <span>예산 · 확인</span>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-8 max-w-2xl">
        <form action="new-step2.html">
          <div class="form-group">
            <label class="form-label">캠페인명 <span class="text-red-500">*</span></label>
            <input type="text" class="form-input" placeholder="캠페인명을 입력하세요" required>
          </div>
          <div class="form-group">
            <label class="form-label">광고주 <span class="text-red-500">*</span></label>
            <div class="flex gap-2">
              <select class="form-input flex-1" required>
                <option value="">광고주 선택</option>
                <option>삼성전자</option>
                <option>현대백화점</option>
                <option>BGF리테일</option>
                <option>스타벅스코리아</option>
              </select>
              <button type="button" onclick="showModal('new-advertiser-modal')" class="px-3 py-2 text-sm text-blue-600 border border-blue-300 rounded-lg hover:bg-blue-50 whitespace-nowrap">+ 신규</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">광고 대행사</label>
            <input type="text" class="form-input" placeholder="광고 대행사명 (선택)">
          </div>
          <div class="form-group">
            <label class="form-label">캠페인 유형 <span class="text-red-500">*</span></label>
            <select class="form-input" required>
              <option value="">유형 선택</option>
              <option>직접 광고</option>
              <option>하우스 광고</option>
              <option>필러</option>
              <option>네이버</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">광고 유형</label>
            <input type="text" class="form-input" placeholder="광고 유형 (선택)">
          </div>

          <div class="flex justify-end gap-2 mt-6 pt-6 border-t border-gray-200">
            <a href="list.html" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">취소</a>
            <button type="submit" class="px-6 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">다음 →</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <!-- 신규 광고주 모달 -->
  <div id="new-advertiser-modal" class="modal-overlay hidden" onclick="hideModal('new-advertiser-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">신규 광고주 등록</h3>
      <div class="form-group">
        <label class="form-label">광고주명 <span class="text-red-500">*</span></label>
        <input type="text" class="form-input" placeholder="광고주명">
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="hideModal('new-advertiser-modal')" class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg">취소</button>
        <button onclick="hideModal('new-advertiser-modal')" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">등록</button>
      </div>
    </div>
  </div>

  <script src="../shared/layout.js"></script>
</body>
</html>
